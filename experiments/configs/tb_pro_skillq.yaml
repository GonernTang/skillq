# Example mg paper config for Terminal-Bench Pro (1.0)
#
# Run with:
#   uv run paper paper run -c paper/experiments/configs/tb_pro_skillq.yaml
#
# Terminal-Bench Pro has 48 tasks; subset via ``task_names:`` below or
# remove the field to run the full corpus. The 24/24 train/test split
# follows lqrl's convention in scripts/configs/tb_pro/.

jobs_dir: output
job_name: tb_pro_skillq__${now:%Y-%m-%d__%H-%M-%S}
n_attempts: 1
n_concurrent_trials: 4
quiet: false

retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError

agent_timeout_multiplier: 4.0

environment:
  type: docker
  force_build: false
  delete: false
  mounts_json:
    - type: bind
      source: ${abspath:.skillq_library/seed}
      target: /skills
      read_only: true

agents:
  - import_path: skillq.skillq_runtime.agent:SkillQClaudeCodeAgent
    model_name: anthropic/claude-sonnet-4-5
    kwargs:
      allowed_skills: []
      recommend:
        # /skills is the in-container path; the bind mount in
        # `environment.mounts_json` above maps the host's
        # ${abspath:.skillq_library/seed} to /skills (read-only).
        skills_dir: /skills
        # Do NOT set prompt_path to
        # paper.skillq_runtime.retrieval_step:rerank_with_ucb. lqrl's
        # step_recommend calls it with extra kwargs (notably key=...)
        # that rerank_with_ucb does not accept, and the agent would
        # TypeError before the agent ever runs. The mg UCB rerank is
        # invoked directly from PaperClaudeCodeAgent.run, not via
        # this prompt_path. Leaving prompt_path unset makes lqrl fall
        # back to its own DEFAULT_PROMPT_PATH
        # (skills_vote.recommend.prompt:build).
      paper_retrieval:
        enabled: true
        k1: 10
        k2: 3
        c_ucb: 0.5
        lambda_: 0.5

datasets:
  - name: terminal-bench-pro
    version: "1.0"
    download_dir: input/tb-pro
    task_names:
      - rebuild-fastproc-for-python-3-13
      # Add more task names here for the full 24-task TB Pro test split.
