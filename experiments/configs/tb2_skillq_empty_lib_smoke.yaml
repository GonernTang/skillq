# TB 2.0 empty-library mini smoke — 1 task, paper mode, all layers on.
#
# 2026-06-25: pre-flight check after wiping skills/ to baseline (no
# skills). Goal: confirm the bridge.py fallbacks (empty lib → no
# library_root contents → TwoStageRanker returns [] / sim_gate_floor
# kicks in) don't crash on the first trial.
#
# Pick `chess-best-move` because it's small, fast, and the agent
# typically solves it in < 5 min on TB 2.0. It has zero skill coverage
# in the seed library so the agent must rely on its own reasoning +
# auto-extract fallback if triggered.

jobs_dir: output
job_name: tb2_skillq_empty_lib_smoke_2026-06-25_rename_smoke
n_attempts: 1
n_concurrent_trials: 1
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 4.0
environment:
  type: docker
  force_build: false
  delete: false
  mounts_json:
    # Bind-mount the (now empty) host seed-skill library. Even with
    # no skills inside, the mount is still added because the YAML
    # field is unconditional; this matches the full run config.
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.skillq_runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 600.0
    kwargs:
      recommend: null
      paper_retrieval:
        enabled: true
        k1: 10
        k2: 3
        c_ucb: 0.5
        lambda_: 0.5
      pull_top_k: 3
datasets:
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench
    task_names:
      - chess-best-move
