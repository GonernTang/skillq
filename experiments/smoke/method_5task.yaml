# MethodConfig for the 5-task TB 2.0 smoke (paper mode, hook).
#
# Modeled on method_git_smoke_hook.yaml but with library_root pointing
# at this smoke's job dir. Used by `experiments/configs/tb2_skillq_smoke_5task.yaml`.
#
# Field rationale:
# - retrieval_mode: hook       — PreToolUse hook fires on Skill tool_use
# - seed_skills_dir             — Plan D: auto-load 36 seed skills into the
#                                 library on first boot (otherwise lib stays
#                                 empty and the bridge has no skills to update)
# - user_claude_md_path         — bridge synthesizes CLAUDE.md.merged with
#                                 the skillq snippet so the agent knows about
#                                 Skill()
# - attribution_model        — same env provider as the
#                                 agent (this host has no OPENAI_API_KEY)
# - embedder_model + embedder_dim                — DashScope via openai/ prefix;
#                                 required because Plan D pre-embeds

library_root: /home/gonern/workspace/skillq/output/tb2_skillq_smoke_5task/.skillq_library
state_path: /home/gonern/workspace/skillq/output/tb2_skillq_smoke_5task/.skillq_library/.state/method_state.json
seed_skills_dir: /home/gonern/workspace/skillq/skills
retrieval_mode: hook
hook_top_k: 3
hook_lambda: 0.5
hook_c_ucb: 0.5
user_claude_md_path: /home/gonern/workspace/skillq/experiments/smoke/_user_claude_md_stub.md
attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
embedder_model: openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
embedder_dim: 1024