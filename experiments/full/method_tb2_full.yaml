# MethodConfig for TB 2.0 FULL run — ALL LAYERS ON.
#
# Layers enabled (matches "方法层全开" requirement):
#   1. Retrieval (Layer 1): TwoStageRanker with sim_z + q_z + UCB bonus.
#   2. Evaluation (Layer 2): Eq.6 Q-update per trial end, per called skill.
#   3. Library management (Layer 3): b_max eviction, q-warm-up admission
#      (handled inside LibManager; no extra config needed).
#   4a. New-skill creation (auto_extract): AttributionAnalyzer + SkillExtractor
#       fires every qualifying trial; creates a new SKILL.md via `claude --print`.
#   4b. Skill modification (incremental edit): on every failed trial
#       (r_task=0), NearMissRefiner (now no-gate per 2026-06-22) proposes
#       a body edit; lib.replace() applies it + re-embeds description if changed.
#
# Differences vs experiments/smoke/method_5task_autoextract.yaml:
#   - library_root / state_path point at the FULL job_name output dir.
#   - No change to retrieval_mode / hook_top_k / lambda / c_ucb / models —
#     the smoke 5-task autoextract version was already the "all layers on"
#     configuration; we just relocate its storage root.
#
# Default attribution_model is `openai/gpt-4o`, which needs an
# OPENAI_API_KEY. This host's .env only ships ANTHROPIC_* (with
# ANTHROPIC_BASE_URL pointing at a DeepSeek-compatible endpoint),
# so we override attribution / verifier / editor to all use
# ANTHROPIC_MODEL via the `anthropic/` LiteLLM prefix.
#
# Editor model: EDITOR_MODEL env var (defaults to deepseek-v4-flash per
# .env on 2026-06-22). The fallback in the OmegaConf resolver is
# `openai/gpt-4o` so the config still loads in environments where
# EDITOR_MODEL is unset.

library_root: /home/gonern/workspace/skillq/output/tb2_skillq_full__2026-06-24/.skillq_library
state_path: /home/gonern/workspace/skillq/output/tb2_skillq_full__2026-06-24/.skillq_library/.state/method_state.json

# === Retrieval (Layer 1) ===
# Default retrieval_mode='auto' decides Method A vs B at on_trial_started.
# Full run starts with 36 seed skills and b_max=100, so lib size < 100
# threshold → Method A ("agentic") would normally fire. We force 'hook'
# (Method B) so the PreToolUse hook's allow/deny gate is always on — this
# is what the smoke 5-task autoextract run validated end-to-end and is
# the only path with the n_retrievals counter (UCB fix verified on 2026-06-22).
# 2026-06-23: switched from "hook" → "pull" so the SessionStart hook
# fires once per trial and injects Top-K skills into the agent's first
# turn context (see hook.py:_handle_session_start). PreToolUse gate
# remains on.
# 2026-06-24: switched scoring formula to "multiplicative" and added
# Hard Gate (sim_gate_min_score=0.30). See Fix 1+2 in plan:
# ~/.claude/plans/bug-3-per-trial-q-table-json-hashed-quilt.md
retrieval_mode: pull
hook_top_k: 3
hook_pull_top_k: 3
hook_lambda: 0.5
hook_c_ucb: 0.5

# === Scoring mode (Fix 2: multiplicative formula) ===
# score = sim·(1 + β·Q_norm) + γ·UCB
# Critical property: when sim=0 the entire sim term vanishes and the
# skill can only rank by UCB — Q cannot promote an irrelevant skill.
hook_score_mode: multiplicative
hook_multiplicative_beta: 0.5
hook_multiplicative_gamma: 0.2
hook_q_clip_min: 0.0
hook_q_clip_max: 1.0

# === Hard Gate (Fix 1: drop low-sim candidates) ===
# sim < sim_gate_min_score → dropped before scoring. floor=1 ensures
# Top-K is never empty on early trials with poor embedding coverage.
# 0.75 is aggressive: only highly semantically relevant skills pass.
sim_gate_min_score: 0.75
sim_gate_floor: 1

# === Q-update (Layer 2) ===
# Simplified to task-only reward on 2026-06-23:
#     Q(skill) += q_alpha * (r_task - Q(skill))
# Default q_alpha=0.3 (MethodConfig). Per-subtask judge + blend removed.
# 2026-06-24 (Fix 3): when q_update_cosine_weight=true, the per-skill
# delta is multiplied by max(cos(phi(q), phi(s)), 0). Irrelevant skills
# (cos ≈ 0) get delta=0 — Q is preserved across failed trials where
# the skill was wrongly recommended.
q_update_cosine_weight: true

# === Q-update (Layer 2) ===
# Simplified to task-only reward on 2026-06-23:
#     Q(skill) += q_alpha * (r_task - Q(skill))
# Default q_alpha=0.3 (MethodConfig). Per-subtask judge + blend removed.

# === Library management (Layer 3) ===
# b_max=100 (raised from default 50 on 2026-06-23 to fit the 36 seeds +
# ~30-60 auto-extracted / edited skills that the 89-task full run is
# expected to produce). Eviction is b_max-only lowest-Q (post Bug 6 fix
# on 2026-06-22). Seeds start at seed_initial_q=0.5, new skills at
# new_skill_initial_q=0.5. Both are explicit here (not relying on the
# config defaults) so the "Q=0.5" intent is self-documenting.
b_max: 1000   # matches new default (config.py); 100 in 6/23 run filled to b_max and started evicting on every auto_extract
seed_initial_q: 0.5
new_skill_initial_q: 0.5
seed_skills_dir: /home/gonern/workspace/skillq/skills

# === Per-subtask hook wiring ===
# Embedding daemon + hook run inside the agent container; settings.json
# registers the PreToolUse hook with Claude Code.
user_claude_md_path: /home/gonern/workspace/skillq/experiments/smoke/_user_claude_md_stub.md

# === LLM models (Layer 4 paths) ===
# `anthropic/<model>` so LiteLLM picks the provider; base URL is
# DeepSeek-compatible per ANTHROPIC_BASE_URL in .env.
attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
editor_model: anthropic/${oc.env:EDITOR_MODEL,openai/gpt-4o}
embedder_model: openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
embedder_dim: 1024   # matches text-embedding-v4 output dim

# === Auto-extract path (Layer 4a — create) ===
enable_auto_extract: true
# Flush every qualifying trial. With 89 trials and ~30-40% likely qualifying
# (no skill used + LLM-judge says extract), this generates ~25-35 new
# SKILL.md files over the run, well under b_max=100. Incremental edits
# (Layer 4b) also write to lib, so headroom is needed.
extract_every_n_trials: 1
extract_max_new_per_trial: 1
extract_timeout_sec: 600

# === Incremental edit path (Layer 4b — modify) ===
# Always fires on r_task=0 (post 2026-06-22 near-miss gate removal).
# No additional config; uses editor_model above + LibManager.replace().

# === Benchmark input root ===
# Local vendored copy under input/ (input/ is in .gitignore so the
# third-party task defs never get committed). Override with
# SkillQ_INPUT_ROOT env var to point at a different local input root.
benchmark_input_path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}