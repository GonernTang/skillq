jobs_dir: output
job_name: tb2_paper__2026-06-05__16-57-34
n_attempts: 5
n_concurrent_trials: 8
quiet: false
retry:
  max_retries: 3
  exclude_exceptions:
  - VerifierTimeoutError
  - RewardFileNotFoundError
  - RewardFileEmptyError
  - VerifierOutputParseError
agent_timeout_multiplier: 4.0
environment:
  type: docker
  force_build: false
  delete: false
agents:
- import_path: paper.paper_mode.agent:PaperClaudeCodeAgent
  model_name: anthropic/claude-sonnet-4-5
  kwargs:
    allowed_skills: []
    recommend:
      skills_dir: ${abspath:.mg_library/seed}
      prompt_path: paper.paper_mode.retrieval_step:rerank_with_ucb
    paper_retrieval:
      enabled: true
      k1: 10
      k2: 3
      c_ucb: 0.5
      lambda_: 0.5
datasets:
- name: terminal-bench
  version: '2.0'
  download_dir: input/tb2
