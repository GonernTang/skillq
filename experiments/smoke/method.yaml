# MethodConfig overrides for the paper-mode smoke test.
#
# MethodConfig defaults place the Q-table / library state at
# Path("./.mg_library") (cwd-relative). For the smoke we want the
# .mg_library/ directory to live under the job output dir, so the
# whole experiment can be wiped with one `rm -rf output/smoke_*`.
#
# Other fields left at defaults: alpha=0.3, beta=0.5, k1=10, k2=3,
# theta_admit=0.25, theta_evict=0.15, theta_near_miss=0.5,
# b_max=50, n_explore=8, n_stale=80, enable_auto_extract=False.

library_root: /home/gonern/workspace/mg/output/smoke_5tasks_v3/.mg_library
state_path: /home/gonern/workspace/mg/output/smoke_5tasks_v3/.mg_library/.state/method_state.json

# Default attribution_model is `openai/gpt-4o`, which needs an
# OPENAI_API_KEY. This host's .env only ships ANTHROPIC_* (with
# ANTHROPIC_BASE_URL pointing at a DeepSeek-compatible endpoint),
# so the attribution LLM call would fail and (because state.save is
# inside the same try block in bridge.on_ended) skip the Q-table
# save. Use the same model the agent uses, prefixed with
# `anthropic/` so LiteLLM picks the right provider (LiteLLM rejects
# bare model names without a `<provider>/<name>` prefix).
attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
