# Smoke TB 2.0 — paper mode — ONE task (gcode-to-text).
#
# Mirrors lqrl/scripts/configs/tb2/claude_code/sonnet/smoke.yaml
# (single-task smoke). The agent runs in the prebuilt container
# `skills_vote/gcode-to-text:20260604` (image is on the host — no
# rebuild needed). SkillQ's container_wiring layer bind-mounts the
# state files into the container and starts the embedding daemon;
# the agent's PreToolUse hook (when the Skill tool is called) writes
# the per-skill signal back to `<trial_dir>/mg_skill_calls.jsonl`;
# on trial end the bridge reads the hook log and updates the
# Q-table at `<output>/<job_name>/.skillq_library/.state/method_state.json`.
#
# Resolver note: stock OmegaConf 2.3 only ships the `oc.*` resolvers.
# `${now:...}` is NOT registered — we use a fixed job_name. The smoke
# script `rm -rf`s the matching output dir before each run.
#
# Dataset note: lqrl uses `download_dir: input/terminal-bench` which
# contains the task dirs (gcode-to-text/, chess-best-move/, etc.).
# The skillq-side input/ is populated by copying the gcode-to-text
# task def from /home/gonern/workspace/lqrl/input/terminal-bench/.

jobs_dir: output
# Stable name; the smoke script `rm -rf`s this before each run.
job_name: tb2_skillq_smoke
n_attempts: 1
n_concurrent_trials: 1
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 4.0
environment:
  type: docker
  # Tell Harbor to actually use the prebuilt image. Without this,
  # Harbor falls back to the task's environment/Dockerfile (a
  # bare `FROM python:3.13-slim-bookworm`) and the trial
  # container has no `claude` binary.
  docker_image: skills_vote/gcode-to-text:20260604
  force_build: false
  delete: false               # keep containers after the run for debugging
  mounts_json:
    # Bind-mount the host's seed-skill library into the container at
    # /skills. The paper method does NOT use SkillsVote's step_recommend
    # (we set recommend: null below), but the seed skills are still
    # useful for the agent's reference — they're listed in the system
    # prompt via PaperClaudeCodeAgent's rerank_with_ucb header.
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.paper_mode.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    kwargs:
      # allowed_skills unset (None) — leave upstream default ("no
      # restriction"). Setting it to [] would force SkillsVote to
      # write its own settings.json at $CLAUDE_CONFIG_DIR/settings.json
      # before our mount takes effect, causing a "Is a directory"
      # collision. The paper method doesn't need skill allowlisting.
      # recommend: null — skip SkillsVote's LLM-based step_recommend
      # entirely. The paper method's design replaces the LLM-based
      # recommend with embedding+Q retrieval (TwoStageRanker). The
      # seed skills are still bind-mounted at /skills in the
      # container (mounts_json above) for the agent's reference.
      recommend: null
      paper_retrieval:
        enabled: true           # the new piece vs skillsvote — client-side UCB rerank
        k1: 10
        k2: 3
        c_ucb: 0.5
        lambda_: 0.5
datasets:
  # Use `path:` (not `name: terminal-bench + download_dir`) so harbor
  # treats this as a LOCAL task tree — no registry clone, no
  # network, no SHA verification. Mirrors lqrl's smoke yaml.
  # The directory should contain task subdirs (gcode-to-text/, ...).
  - path: ${oc.env:SkillQ_INPUT,./input}/terminal-bench
    task_names:
      - gcode-to-text