# Prebuild config for Terminal-Bench 2.0 (all 89 tasks) with Claude Code agent.
# Builds Docker images tagged as ``skills_vote/<task>:20260706``.
#
# Usage:
#   uv run python skillq/prebuild_images.py --cfg-path experiments/configs/prebuild_tb2_claude.yaml
# Or via CLI:
#   uv run skillq prebuild run --benchmark tb2 --agent claude-code
#
# Already-built images are skipped automatically (docker image inspect cache).
# Set ``image_tag`` to a different date to force a full rebuild.
max_workers: 4
datasets:
  - name: terminal-bench
    version: "2.0"
    download_dir: input/terminal-bench
    registry_url: null
    registry_path: null
