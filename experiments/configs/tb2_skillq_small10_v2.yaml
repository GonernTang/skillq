# TB 2.0 SMALL-10 v2 — 10-task validation after all 5 L3/L4 gap fixes.
#
# 10 different tasks from the original small10 batch to avoid
# deterministic overfitting. Categories: game, hardware, crypto,
# VCS, ML, graphics, virtualization, regex, DB, build.
#
# Why these 10 (2026-07-01, post gap 1-5 fixes):
#   - chess-best-move      — game / search (replaces caffe-cifar-10)
#   - circuit-fibsqrt      — hardware / synthesis
#   - crack-7z-hash        — crypto / brute-force
#   - git-leak-recovery    — VCS / forensics
#   - hf-model-inference   — ML / HuggingFace inference
#   - path-tracing         — graphics / rendering
#   - qemu-alpine-ssh      — virtualization / boot
#   - regex-chess          — regex / constraint-solving
#   - sqlite-db-truncate   — DB / recovery (replaces db-wal-recovery)
#   - build-pmars          — build / C compilation
#
# Wall-clock estimate: 10 tasks, n_concurrent_trials=4, ~45-75 min
#
# Method: same as tb2_skillq_full.yaml (L1 multiplicative, L3/L4
# with deepseek-v4-flash, extract_every_n_trials=1, fresh-start).
# All 5 gap fixes are applied in the runtime code.
#
# Run:
#   uv run python experiments/run/run_benchmark.py \
#     --benchmark tb2 --variant small10_v2 --fresh-start

jobs_dir: output
job_name: tb2_skillq_small10_v2__${now:%Y-%m-%d__%H-%M-%S}
n_attempts: 1
n_concurrent_trials: 4
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 1.0
environment:
  type: docker
  force_build: false
  delete: false
  mounts_json:
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 3600.0
    kwargs:
      reasoning_effort: high
datasets:
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench
    task_names:
      - chess-best-move           # game / search
      - circuit-fibsqrt           # hardware / synthesis
      - crack-7z-hash             # crypto / brute-force
      - git-leak-recovery         # VCS / forensics
      - hf-model-inference        # ML / HF inference
      - path-tracing              # graphics / rendering
      - qemu-alpine-ssh           # virtualization / boot
      - fix-git                  # VCS / repair (replaces regex-chess: OOM risk)
      - sqlite-db-truncate        # DB / data recovery
      - build-pmars               # build / C compilation

# === Paper method (verbatim from tb2_skillq_full.yaml) ===
method:
  retrieval_mode: pull

  library_root: ${oc.env:SkillQ_OUTPUT_ROOT,/home/gonern/workspace/skillq/output}/${job_name}/.skillq_library
  state_path:   ${oc.env:SkillQ_OUTPUT_ROOT,/home/gonern/workspace/skillq/output}/${job_name}/.skillq_library/.state/method_state.json
  emb_cache_path: ${oc.env:SkillQ_EMB_CACHE_PATH,/home/gonern/workspace/skillq/skills/.skillq_state/emb_cache.json}
  seed_skills_dir: /home/gonern/workspace/skillq/skills

  retrieval:
    top_k: 3
    score_mode: multiplicative
    beta: 0.5
    gamma: 0.2
    sim_gate_min_score: 0.5
    sim_gate_floor: 0
    c_ucb: 0.5
    lambda: 0.5

  attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
  editor_model:      anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
  embedder_model:    openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
  embedder_dim: 1024

  evolve:
    enabled: true
    extract_every_n_trials: 1
    enforce_failure_skill_structure: true

  b_max: 1000
  seed_initial_q: 0.5

  reuse_q_table: true
  reuse_embedding_cache: true

  runtime: new
