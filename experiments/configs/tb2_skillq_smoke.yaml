# 1-task TB 2.0 smoke (Step 8, 2026-06-27) — merged job+method YAML.
#
# Replaces tb2_skillq_smoke_v3.yaml + method_tb2_skillq_smoke_v3.yaml
# (both deleted in Step 8.2). The new format puts the entire paper
# method config under a top-level ``method:`` subtree; the single-
# driver in experiments/run/run_benchmark.py extracts the subtree
# and writes a sibling <job_name>.method.yaml before invoking
# ``skillq paper run``.
#
# Run directly:
#   uv run python experiments/run/run_benchmark.py --benchmark tb2 --variant smoke
#
# Or, manually:
#   uv run skillq paper run \
#       -c experiments/configs/tb2_skillq_smoke.yaml

jobs_dir: output
job_name: tb2_skillq_smoke__${now:%Y-%m-%d__%H-%M-%S}
n_attempts: 1
n_concurrent_trials: 1     # single task → single concurrent
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 1.0
environment:
  type: docker
  force_build: false
  delete: false
  mounts_json:
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 1800.0    # 30min ceiling — enough for one chess task
    kwargs:
      reasoning_effort: high
datasets:
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench
    task_names:
      - chess-best-move

# === Paper method (was method_tb2_skillq_smoke_v3.yaml) ===
method:
  # Run-scoped persistence. The driver rewrites these to
  # <output>/<job_name>/.skillq_library/... at run time.
  library_root: ${oc.env:SkillQ_OUTPUT_ROOT,/home/gonern/workspace/skillq/output}/${job_name}/.skillq_library
  state_path:   ${oc.env:SkillQ_OUTPUT_ROOT,/home/gonern/workspace/skillq/output}/${job_name}/.skillq_library/.state/method_state.json
  seed_skills_dir: /home/gonern/workspace/skillq/skills

  # Layer 1 retrieval (was hook_*)
  retrieval:
    top_k: 3
    score_mode: multiplicative
    beta: 0.5
    gamma: 0.2
    sim_gate_min_score: 0.7
    sim_gate_floor: 0
    c_ucb: 0.5
    lambda: 0.5

  # LLM models
  attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
  editor_model:      anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
  embedder_model:    openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
  embedder_dim: 1024

  # Layer 4 evolve
  evolve:
    enabled: true
    extract_every_n_trials: 4
    enforce_failure_skill_structure: true

  # Library mgmt
  b_max: 1000
  seed_initial_q: 0.5

  # Fresh-start toggles
  reuse_q_table: true
  reuse_embedding_cache: true

  # Feature flag (Step 7): only "new" is supported; "legacy" raises
  # RuntimeError. Kept here so YAMLs that pin the legacy value still
  # parse, but every run will fail loud at bridge startup.
  runtime: new
