# 1-task smoke for v3 (2026-06-26).
#
# Same as tb2_skillq_full_v3.yaml, but with a single task
# (chess-best-move) to validate the new hook wiring fix in
# isolation. Once this smoke passes (multiplicative mode fires
# in the container, Q-table gets non-trivial updates, skill-call
# rate > 0), we launch the full 89-task run.
#
# Run with:
#   uv run skillq paper run \
#       -c experiments/configs/tb2_skillq_smoke_v3.yaml \
#       --method-config experiments/configs/method_tb2_skillq_full_v3.yaml

jobs_dir: output
# Smoke-specific job_name so we don't clash with the upcoming
# full v3 run directory.
job_name: tb2_skillq_smoke_v3__2026-06-26
n_attempts: 1
n_concurrent_trials: 1   # single task → single concurrent
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 1.0
environment:
  type: docker
  force_build: false
  delete: false
  mounts_json:
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.skillq_runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 1800.0    # 30min ceiling — enough for one chess task
    kwargs:
      reasoning_effort: high
datasets:
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench
    task_names:
      - chess-best-move
