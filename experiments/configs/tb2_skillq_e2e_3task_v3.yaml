# 3-task e2e smoke (2026-06-26) — exercises all 4 layers.
#
# Mirrors tb2_skillq_smoke_v3.yaml but expands to 3 tasks chosen to
# span the L1-L4 surface area:
#
#   1. chess-best-move   — baseline success path (already in the
#                          smoke config). Verifies L1 retrieval +
#                          L2 Q-update on a known-good task.
#   2. circuit-fibsqrt   — classic L3 candidate (prompts.py
#                          references the "7 versions of gen.py"
#                          case study). Likely FAILURE_SKILL_USED,
#                          forcing L3 Edit to fire and persist.
#   3. extract-elf       — different domain (binary parsing).
#                          Different skill coverage from the
#                          chess/fibsqrt pair → exercises L4
#                          dedup so we don't see duplicate skills.
#
# Run with:
#   uv run skillq paper run \
#       -c experiments/configs/tb2_skillq_e2e_3task_v3.yaml \
#       --method-config experiments/configs/method_tb2_skillq_e2e_3task_v3.yaml

jobs_dir: output
# Scoped to today's e2e subset so it doesn't clash with smoke or
# the (parked) full v3 run.
job_name: tb2_skillq_e2e_3task_v3__2026-06-26
n_attempts: 1
n_concurrent_trials: 1   # sequential — easier per-task attribution
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 1.0
environment:
  type: docker
  force_build: false     # all 3 images already prebuilt locally
  delete: false
  mounts_json:
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.skillq_runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 1800.0    # 30min ceiling per task
    kwargs:
      reasoning_effort: high
datasets:
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench
    task_names:
      - chess-best-move
      - circuit-fibsqrt
      - extract-elf
