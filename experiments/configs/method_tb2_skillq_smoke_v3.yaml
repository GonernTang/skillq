# MethodConfig override for the 1-task v3 smoke (2026-06-26).
#
# Mirrors method_tb2_skillq_full_v3.yaml exactly, but with
# library_root + state_path + emb_cache_path pointing at the
# smoke's own output dir. The state files are scoped to the
# smoke so they don't pollute (or get clobbered by) the upcoming
# v3 full run.
#
# Run with:
#   uv run skillq paper run \
#       -c experiments/configs/tb2_skillq_smoke_v3.yaml \
#       --method-config experiments/configs/method_tb2_skillq_smoke_v3.yaml

# Smoke-scoped persistence. Same shape as v3 full, but rooted
# in the smoke job_name's library dir.
library_root: /home/gonern/workspace/skillq/output/tb2_skillq_smoke_v3__2026-06-26/.skillq_library
state_path: /home/gonern/workspace/skillq/output/tb2_skillq_smoke_v3__2026-06-26/.skillq_library/.state/method_state.json

seed_skills_dir: /home/gonern/workspace/skillq/skills

# Hook-mode retrieval with multiplicative scoring.
retrieval_mode: hook
hook_score_mode: multiplicative
hook_top_k: 3
hook_multiplicative_beta: 0.5
hook_multiplicative_gamma: 0.2

user_claude_md_path: /home/gonern/workspace/skillq/experiments/smoke/_user_claude_md_stub.md

attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
editor_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}

embedder_model: openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
embedder_dim: 1024
