# Smoke config: 5 TB 2.0 tasks, paper mode, end-to-end.
#
# Tasks (all have prebuilt skills_vote/<task>:20260604 images on the host
# and task.toml entries copied from lqrl's input/terminal-bench/):
#   - gcode-to-text                 (medium, 300s expert) — already smoke-tested
#   - fix-code-vulnerability        (medium, ~3min expert) — already smoke-tested
#   - configure-git-webserver       (medium, ~3min expert) — already smoke-tested
#   - chess-best-move               (small, fast)
#   - nginx-request-logging         (small, fast)
#
# Each task.toml declares its own docker_image (skills_vote/<task>:20260604),
# so Harbor picks the right prebuilt image per task without us listing
# them in environment.docker_image.
#
# Seed skills dir + paper-mode mounts_json carry over from the single-task
# smoke (`experiments/smoke/fix-git_skillq_smoke.yaml`).
#
# Wall-clock estimate: 5-15 min per task at ~1 trial / 5min LLM time.

jobs_dir: output
# Stable name; the runner `rm -rf`s this before each run.
job_name: tb2_skillq_smoke_5task_autoextract
n_attempts: 1
n_concurrent_trials: 5
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 4.0
environment:
  type: docker
  force_build: false
  delete: false               # keep containers after the run for debugging
  mounts_json:
    # Bind-mount the host's seed-skill library into the container at
    # /skills. SkillQClaudeCodeAgent's `rerank_with_ucb` lists these in
    # the system prompt header; the agent can also invoke them via
    # the Skill tool (the PreToolUse hook logs the call and updates Q).
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.paper_mode.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    kwargs:
      # recommend: null — skip SkillsVote's LLM-based step_recommend.
      # Paper method replaces it with embedding+Q retrieval (TwoStageRanker).
      # See fix-git_skillq_smoke.yaml for full rationale.
      recommend: null
      paper_retrieval:
        enabled: true
        k1: 10
        k2: 3
        c_ucb: 0.5
        lambda_: 0.5
datasets:
  - path: ${oc.env:SkillQ_INPUT,./input/terminal-bench}
    task_names:
      - gcode-to-text
      - fix-code-vulnerability
      - configure-git-webserver
      - chess-best-move
      - nginx-request-logging