# MethodConfig for the 5-task TB 2.0 smoke — AUTO-EXTRACT VARIANT.
#
# Identical to method_5task.yaml except:
#   - enable_auto_extract: true   (default is False; this turns on the
#                                  attribution + SkillExtractor pipeline)
#   - extract_every_n_trials: 1   (flush the extract buffer every qualifying
#                                  trial so we see skills appear end-to-end
#                                  within the 5-trial window)
#
# What this exercises vs the previous smoke:
#   1. AttributionAnalyzer.analyze() runs on every trial → 6-class enum
#      verdict gets logged.
#   2. Rule 2 (success): r_task=1 AND attribution ∈
#      {SUCCESS_VIEWED_SKILL_BUT_NOT_USED, SUCCESS_NO_SKILL_SEEN} AND
#      knowledge_to_extract non-empty → success-path extraction.
#   3. Rule 5 (failure): r_task=0 AND attribution ∈
#      {FAIL_AGENT_ISSUE, FAIL_SKILL_ISSUE} AND knowledge_to_extract
#      non-empty → failure-path extraction.
#   4. SkillExtractor.extract_batch() spawns `claude --print` subprocess
#      to generate a new SKILL.md.
#
# Caveat: with 36 seed skills covering most of TB 2.0, the agent will
# likely use a relevant seed skill in successful trials, so attribution
# will lean SUCCESS_SKILL_USED (not Rule 2). Rule 5 may fire for the
# two failed trials (chess-best-move, gcode-to-text) IF the attribution
# LLM says FAIL_AGENT_ISSUE and returns a knowledge string.

library_root: /home/gonern/workspace/skillq/output/tb2_skillq_smoke_5task_autoextract/.skillq_library
state_path: /home/gonern/workspace/skillq/output/tb2_skillq_smoke_5task_autoextract/.skillq_library/.state/method_state.json
seed_skills_dir: /home/gonern/workspace/skillq/skills
retrieval_mode: hook
hook_top_k: 3
hook_lambda: 0.5
hook_c_ucb: 0.5
user_claude_md_path: /home/gonern/workspace/skillq/experiments/smoke/_user_claude_md_stub.md
attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
q_subtask_verifier_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
embedder_model: openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
embedder_dim: 1024

# === auto-extract path (turn on) ===
enable_auto_extract: true
extract_every_n_trials: 1