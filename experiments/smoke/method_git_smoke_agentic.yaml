# MethodConfig for agentic-mode (Method A) configure-git-webserver smoke.
#
# Differences from method_git_smoke_hook.yaml:
#   - retrieval_mode: "agentic"  (force Method A, not auto/hook)
#   - fresh library_root / state_path (don't collide with the
#     hook smoke's state)
#
# Method A doesn't need the embedding service (no PreToolUse hook fires).
# `embedder_model` IS set below because Plan D still pre-embeds seed-skill
# descriptions so the cosine term in Eq.4 isn't permanently 0.

library_root: /home/gonern/workspace/skillq/output/tb2_git_smoke_agentic/.skillq_library
state_path: /home/gonern/workspace/skillq/output/tb2_git_smoke_agentic/.skillq_library/.state/method_state.json
seed_skills_dir: /home/gonern/workspace/skillq/skills
retrieval_mode: agentic
agentic_search_top_k: 3
agentic_search_k_rrf: 60
agentic_skill_dir_name: skillq_skills
# Attribution model used by the LLM-as-judge for the per-trial
# attribution step (separate from auto-extract; this one always
# runs and decides Rule 2/5 trigger eligibility).
attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
# Method A doesn't need the hook's embedding service daemon, but
# ``attach_paper_registers`` still pre-embeds seed-skill
# descriptions (Plan D) so the cosine term in Eq.4 isn't
# permanently 0. The default ``text-embedding-3-small`` 404s on
# this env (only DashScope key is set), so route through the
# same provider the hook smoke uses.
embedder_model: openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
embedder_dim: 1024
