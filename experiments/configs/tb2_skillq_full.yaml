# TB 2.0 FULL run (Step 8, 2026-06-27) â€” paper mode, all 89 tasks.
#
# Replaces tb2_skillq_full_v3.yaml + method_tb2_skillq_full_v3.yaml +
# method_tb2_skillq_full.yaml + method_tb2_skillq_fresh_start.yaml
# (all deleted in Step 8.2). Fresh-start semantics are now opt-in via
# the --fresh-start flag on run_benchmark.py.
#
# Wall-clock estimate: 89 tasks Ă— ~10min LLM time each, with
# n_concurrent_trials=8 running ~11 batches. ~60-90min for the
# agent step alone; auto-extract LLM calls add another 10-15%.
#
# Model: ANTHROPIC_MODEL=deepseek-v4-flash (.env), wrapped as
# `anthropic/<model>` so LiteLLM picks the provider. Override
# per-run by editing .env or by editing the agents[0].model_name line.
#
# Task source: local copy under skillq/input/terminal-bench/ â€” has all
# 89 task definitions + 7 harbor hash subdirs, vendored so skillq is
# self-contained (input/ is in .gitignore).
#
# Time budget per trial: 3600s = 1h.
#
# CRITICAL (2026-06-25): Harbor's `_resolve_step_timeout`
# (harbor/trial/trial.py:507-525) computes the effective ceiling as
# `min(override, max) * multiplier`. With `override_timeout_sec=3600`
# AND `agent_timeout_multiplier=4.0` the effective ceiling is
# **14400s = 4 hours**, not 3600s â€” Harbor multiplies the multiplier
# ON TOP OF the override. circuit-fibsqrt (2026-06-24 run) hit
# 6343s/agent before timing out naturally (reward=0.0); the 3600s
# ceiling never fired. Fix: drop the multiplier to 1.0 so the
# override becomes the real ABSOLUTE ceiling.
#
# Run:
#   uv run python experiments/run/run_benchmark.py --benchmark tb2 --variant full
#
# Fresh-start variant (clears Q-table + emb_cache):
#   uv run python experiments/run/run_benchmark.py --benchmark tb2 --variant full --fresh-start

jobs_dir: output
job_name: tb2_skillq_full__${now:%Y-%m-%d__%H-%M-%S}
n_attempts: 1
n_concurrent_trials: 8
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 1.0   # see top-of-file note: multiplierĂ—override bug
environment:
  type: docker
  force_build: false
  delete: false               # keep containers after the run for debugging
  mounts_json:
    # Bind-mount the host's seed-skill library into the container at
    # /skills. The container hook can read skill bodies (PostToolUse)
    # and the PreToolUse hook logs every call into calls_log.jsonl.
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 3600.0    # 1h ABSOLUTE ceiling per trial
    kwargs:
      # Force reasoning_effort=high on the in-container Claude Code.
      # Harbor's env_fallback would otherwise pick up CLAUDE_CODE_EFFORT_LEVEL
      # from the parent shell, which on this host is "max" (invalid; Harbor
      # only accepts low/medium/high). Explicit kwarg wins over env_fallback.
      reasoning_effort: high
datasets:
  # Use the local vendored copy under input/terminal-bench/. input/ is in
  # .gitignore so the bundled task defs never get committed. Override
  # with SkillQ_INPUT_ROOT env var to point at a different local input
  # root (e.g. when running outside this repo).
  #
  # Why `path:` instead of `name: + version: + download_dir:`:
  # The `name+version` form tells Harbor to download the dataset from
  # the registry, which (a) requires network and (b) creates a
  # content-addressable hash cache under the same input dir (89
  # 20-char subdirs alongside the 89 task-name dirs). Those hash
  # subdirs reference ``alexgshaw/<task>:20251031`` (the upstream
  # prebuilt images) which we don't have locally â€” and pulling them
  # from Docker Hub times out. The ``path:`` form reads the local
  # task defs directly without downloading or creating a cache, and
  # our local task defs reference ``skills_vote/<task>:20260604``
  # which we do have prebuilt. This is the same form lqrl's
  # baseline.yaml uses.
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench

# === Paper method ===
method:
  library_root: ${oc.env:SkillQ_OUTPUT_ROOT,/home/gonern/workspace/skillq/output}/${job_name}/.skillq_library
  state_path:   ${oc.env:SkillQ_OUTPUT_ROOT,/home/gonern/workspace/skillq/output}/${job_name}/.skillq_library/.state/method_state.json
  seed_skills_dir: /home/gonern/workspace/skillq/skills

  retrieval:
    top_k: 3
    score_mode: multiplicative
    beta: 0.5
    gamma: 0.2
    sim_gate_min_score: 0.7
    sim_gate_floor: 0
    c_ucb: 0.5
    lambda: 0.5

  attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
  editor_model:      anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
  embedder_model:    openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
  embedder_dim: 1024

  evolve:
    enabled: true
    extract_every_n_trials: 4
    semantic_dedup_threshold: 0.85
    enforce_failure_skill_structure: true

  b_max: 1000
  seed_initial_q: 0.5

  reuse_q_table: true
  reuse_embedding_cache: true

  runtime: new
