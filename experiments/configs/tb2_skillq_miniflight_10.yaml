# TB 2.0 MINI-FLIGHT — 10-task pre-flight before committing to the full 89-task run.
#
# Purpose (2026-06-25):
#   - Validate the multiplier×override bug fix (1.0 × 3600 = real 3600s ceiling)
#   - Validate the three prompt refinements (HOOK rewrite, gap_description,
#     Diagnostic checklist + Stop signal in failure-path SKILL synth)
#   - Validate uv cache RW bind survives 10 concurrent trials
#   - Sample skill-call rate to decide if #87 investigation is needed
#   - Sample auto-extract output quality before scaling to 89
#
# Task selection rationale (diverse, 10):
#   - 5 already smoke-tested (continuity check):
#       gcode-to-text, fix-code-vulnerability, configure-git-webserver,
#       chess-best-move, nginx-request-logging
#   - circuit-fibsqrt (MUST include — the 2026-06-24 pathological case
#       that hit 115min / $56; verifies prompt fix works)
#   - fix-git (git-debug domain)
#   - password-recovery (crypto domain)
#   - query-optimize (DB / SQL domain)
#   - path-tracing (compute-heavy — stresses wall-clock ceiling)
#
# Wall-clock estimate:
#   - 10 trials at n_concurrent_trials=5 → ~2 batches of ~30-50 min each
#   - Total ~60-100 min agent step + 10-15% extract overhead
#   - If any trial hits >50min wall-clock, that's a signal the ceiling
#     fix is still off (or the SKILL avoidance guidance is missing).
#
# All other config inherits tb2_skillq_full.yaml's correctness fixes
# (multiplier=1.0, override_timeout_sec=3600.0, retry.max_retries=0,
# paper_retrieval enabled).

jobs_dir: output
job_name: tb2_skillq_miniflight_10__2026-06-25
n_attempts: 1
n_concurrent_trials: 5          # half of full run — better signal-to-cost ratio for triage
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 1.0   # critical: with override=3600, real ceiling = 3600s
environment:
  type: docker
  force_build: false
  delete: false                 # keep containers after the run for post-mortem
  mounts_json:
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.skillq_runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 3600.0    # 1h ABSOLUTE ceiling per trial
    kwargs:
      recommend: null
      paper_retrieval:
        enabled: true
        k1: 10
        k2: 3
        c_ucb: 0.5
        lambda_: 0.5
datasets:
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench
    task_names:
      - chess-best-move              # smoke (small, fast)
      - nginx-request-logging        # smoke (small, fast)
      - gcode-to-text                # smoke (medium)
      - fix-code-vulnerability       # smoke (medium)
      - configure-git-webserver      # smoke (medium)
      - circuit-fibsqrt              # pathological — verify prompt fix
      - fix-git                      # git-debug domain
      - password-recovery            # crypto domain
      - query-optimize               # DB / SQL domain
      - path-tracing                 # compute-heavy, stresses wall-clock ceiling