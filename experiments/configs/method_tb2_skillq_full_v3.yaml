# MethodConfig override for the TB 2.0 full run (paper mode).
#
# This file is passed to `skillq paper run` via `--method-config` so
# the bridge seeds the library from the host `skills/` dir on first
# boot (Plan D) AND so the per-trial hook actually has skills to rank.
#
# Without this file (i.e. running with MethodConfig defaults):
#   - seed_skills_dir defaults to None → library stays empty
#   - retrieval_mode defaults to whatever (likely 'none')
#   - hook PreToolUse never fires (no skills to log)
#   - agent never calls Skill() — SkillQ layer is silently bypassed
#
# This was the root cause of the mini-flight "skill-call rate = 0/10"
# finding on 2026-06-25 (manifest was empty {}, q_table.json stayed {}).
#
# Mirrors experiments/smoke/method_5task.yaml structure, with the
# library_root/stated_path pointing at THIS job's output dir.

# Bind-mount target. SkillQClaudeCodeAgent reads these via env vars
# SKILLQ_AGENTIC_SKILLS_DIR / SKILLQ_AGENTIC_SEARCH_SCRIPT /
# SKILLQ_AGENTIC_MANIFEST. The bridge writes the staged skills here
# during on_trial_started.
#
# 2026-06-25: 3rd full run (v3); library_root and state_path both
# point at this run's output dir so each run has its own clean
# Q-table / emb_cache lifecycle. The runner `rm -rf`s the job_name
# dir before the run, so starting from scratch is the default.
# To *resume* from v2's Q-table, copy
# `output/tb2_skillq_full__2026-06-25/.skillq_library/.state/`
# into the v3 path before launching, OR pass
# `--override method.state_path=...` on the CLI.
library_root: /home/gonern/workspace/skillq/output/tb2_skillq_full__2026-06-26/.skillq_library
state_path: /home/gonern/workspace/skillq/output/tb2_skillq_full__2026-06-26/.skillq_library/.state/method_state.json

# Plan D: walk this dir for SKILL.md files and pre-populate the
# library on first boot. Mirrors the bind-mount target in the job
# config (experiments/configs/tb2_skillq_full.yaml mounts_json).
seed_skills_dir: /home/gonern/workspace/skillq/skills

# Hook-mode retrieval. PreToolUse hook on Skill() fires the
# embedding-based rerank and writes to skill_calls log.
#
# 2026-06-25: switched to "multiplicative" scoring (2026-06-24 fix;
# default in MethodConfig but written explicitly here so the yaml
# matches the formula actually being used). The legacy
# `hook_lambda` / `hook_c_ucb` fields are silently ignored under
# this mode and have been removed.
#
# Formula: score = sim·(1 + β·Q_norm) + γ·UCB
# - sim is RAW cosine (not z-scored)
# - Q_norm = clamp(Q, [0, 1]) → (Q - 0) / 1
# - When sim=0, the sim term vanishes — Q cannot promote an
#   irrelevant skill into Top-K (this is the bug the additive
#   formula had, hence the switch).
retrieval_mode: hook
hook_score_mode: multiplicative
hook_top_k: 3
hook_multiplicative_beta: 0.5
hook_multiplicative_gamma: 0.2

# CLAUDE.md synthesis (bridge writes .claude/CLAUDE.md with the
# skillq snippet pointing at the staged skills).
user_claude_md_path: /home/gonern/workspace/skillq/experiments/smoke/_user_claude_md_stub.md

# LLM-bound pipeline. Attribution + edit use the host's ANTHROPIC_MODEL
# (deepseek-v4-flash via anthropic-compatible endpoint, set via env).
# Same model as the agent in container.
attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
editor_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}

# Embedding service config (Plan D pre-embeds seeded skills).
embedder_model: openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
embedder_dim: 1024