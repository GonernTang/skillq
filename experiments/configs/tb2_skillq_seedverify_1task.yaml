# 1-task SEED VERIFY smoke — confirms SkillQ pipeline fires with method-config.
#
# Same structure as tb2_skillq_miniflight_10.yaml but with 1 fast task
# (chess-best-move) and the new method-config that sets
# seed_skills_dir. If this smoke shows Skill calls and a non-empty
# q_table.json, we can confidently kick the full 89-task run with
# the same method-config.

jobs_dir: output
job_name: tb2_skillq_seedverify_1__2026-06-25
n_attempts: 1
n_concurrent_trials: 1
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 1.0
environment:
  type: docker
  force_build: false
  delete: false
  mounts_json:
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.skillq_runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 3600.0
    kwargs:
      recommend: null
      paper_retrieval:
        enabled: true
        k1: 10
        k2: 3
        c_ucb: 0.5
        lambda_: 0.5
datasets:
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench
    task_names:
      - chess-best-move