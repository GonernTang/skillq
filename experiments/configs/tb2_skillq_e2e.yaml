# 3-task TB 2.0 e2e (Step 8, 2026-06-27) — exercises all 4 layers.
#
# Replaces tb2_skillq_e2e_3task_v3.yaml + method_tb2_skillq_e2e_3task_v3.yaml
# (both deleted in Step 8.2). 3 tasks chosen to span L1-L4 surface area:
#
#   1. chess-best-move   — baseline success path (verifies L1
#                          retrieval + L2 Q-update).
#   2. circuit-fibsqrt   — classic L3 candidate (likely
#                          FAILURE_SKILL_USED → L3 EditRefiner).
#   3. extract-elf       — different domain (binary parsing); exercises
#                          L4 dedup so we don't see duplicate skills.
#
# Run:
#   uv run python experiments/run/run_benchmark.py --benchmark tb2 --variant e2e

jobs_dir: output
job_name: tb2_skillq_e2e__${now:%Y-%m-%d__%H-%M-%S}
n_attempts: 1
n_concurrent_trials: 1     # sequential — cleaner per-task attribution
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 1.0
environment:
  type: docker
  force_build: false
  delete: false
  mounts_json:
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.runtime.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    override_timeout_sec: 1800.0    # 30min ceiling per task
    kwargs:
      reasoning_effort: high
datasets:
  - path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}/terminal-bench
    task_names:
      - chess-best-move
      - circuit-fibsqrt
      - extract-elf

# === Paper method ===
method:
  library_root: ${oc.env:SkillQ_OUTPUT_ROOT,/home/gonern/workspace/skillq/output}/${job_name}/.skillq_library
  state_path:   ${oc.env:SkillQ_OUTPUT_ROOT,/home/gonern/workspace/skillq/output}/${job_name}/.skillq_library/.state/method_state.json
  seed_skills_dir: /home/gonern/workspace/skillq/skills

  retrieval:
    top_k: 3
    score_mode: multiplicative
    beta: 0.5
    gamma: 0.2
    sim_gate_min_score: 0.7
    sim_gate_floor: 0
    c_ucb: 0.5
    lambda: 0.5

  attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
  editor_model:      anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
  embedder_model:    openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
  embedder_dim: 1024

  evolve:
    enabled: true
    extract_every_n_trials: 4
    semantic_dedup_threshold: 0.85
    enforce_failure_skill_structure: true

  b_max: 1000
  seed_initial_q: 0.5

  reuse_q_table: true
  reuse_embedding_cache: true

  runtime: new
