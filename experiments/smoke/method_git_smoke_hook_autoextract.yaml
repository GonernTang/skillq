# MethodConfig for hook-mode (Method B) auto-extract smoke.
#
# Same as method_git_smoke_hook.yaml but with the auto-extract
# Layer 4 path enabled. `extract_every_n_trials=1` makes the
# spawn-once-per-qualifying-trial (no batching) so a single
# smoke trial is enough to fire the SkillExtractor.

library_root: /home/gonern/workspace/skillq/output/tb2_fix_code_vuln_smoke_autoextract/.skillq_library
state_path: /home/gonern/workspace/skillq/output/tb2_fix_code_vuln_smoke_autoextract/.skillq_library/.state/method_state.json
seed_skills_dir: /home/gonern/workspace/skillq/skills
retrieval_mode: hook
hook_top_k: 3
hook_lambda: 0.5
hook_c_ucb: 0.5
user_claude_md_path: /home/gonern/workspace/skillq/experiments/smoke/_user_claude_md_stub.md
attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
q_subtask_verifier_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
embedder_model: openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
embedder_dim: 1024
# Auto-extract (Layer 4) — opt-in
enable_auto_extract: true
extract_every_n_trials: 1
extract_timeout_sec: 120
new_skill_initial_q: 0.5
