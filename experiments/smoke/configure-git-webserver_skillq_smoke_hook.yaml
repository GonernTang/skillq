# Smoke-test config: ONE TB 2.0 task (configure-git-webserver), paper mode,
# hook (Method B) variant. NEW job_name so we don't collide with the
# agentic trial's results in the same output dir.

jobs_dir: output
job_name: tb2_git_smoke_hook_v2
n_attempts: 1
n_concurrent_trials: 1
quiet: false
retry:
  max_retries: 0
  exclude_exceptions:
    - VerifierTimeoutError
    - RewardFileNotFoundError
    - RewardFileEmptyError
    - VerifierOutputParseError
agent_timeout_multiplier: 4.0
environment:
  type: docker
  docker_image: skills_vote/configure-git-webserver:20260604
  force_build: false
  delete: false
  mounts_json:
    - type: bind
      source: /home/gonern/workspace/skillq/skills
      target: /skills
      read_only: true
agents:
  - import_path: skillq.paper_mode.agent:SkillQClaudeCodeAgent
    model_name: ${oc.env:ANTHROPIC_MODEL,anthropic/claude-sonnet-4-5}
    kwargs:
      recommend: null
      paper_retrieval:
        enabled: true
        k1: 10
        k2: 3
        c_ucb: 0.5
        lambda_: 0.5
datasets:
  - path: ${oc.env:SkillQ_INPUT,./input/terminal-bench}
    task_names:
      - configure-git-webserver
