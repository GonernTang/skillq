# MethodConfig for empty-library mini smoke (2026-06-25).
#
# Same hyperparameters as experiments/full/method_tb2_full.yaml, just
# relocated to a smoke-specific output dir so the full-run library +
# Q-table stay untouched (clean for the next production run).
#
# IMPORTANT: seed_skills_dir points at the (now empty) skills/ dir.
# This is the same path the full run will use — the empty library is
# the explicit starting state we want to validate.

library_root: /home/gonern/workspace/skillq/output/tb2_skillq_empty_lib_smoke_2026-06-25/.skillq_library
state_path: /home/gonern/workspace/skillq/output/tb2_skillq_empty_lib_smoke_2026-06-25/.skillq_library/.state/method_state.json

# === Retrieval (Layer 1) ===
retrieval_mode: pull
hook_top_k: 3
hook_pull_top_k: 3
hook_lambda: 0.5
hook_c_ucb: 0.5

# === Scoring mode (multiplicative + Hard Gate) ===
hook_score_mode: multiplicative
hook_multiplicative_beta: 0.5
hook_multiplicative_gamma: 0.2
hook_q_clip_min: 0.0
hook_q_clip_max: 1.0

sim_gate_min_score: 0.7
sim_gate_floor: 1

# === Q-update (Layer 2) ===
q_update_cosine_weight: true

# === Verifier warm cache (2026-06-24, Bug #4 fix) ===
verifier_uv_cache_path: /home/gonern/.skillq_cache/uv

# === Library management (Layer 3) ===
b_max: 1000
seed_initial_q: 0.5
new_skill_initial_q: 0.5
seed_skills_dir: /home/gonern/workspace/skillq/skills

# === Per-subtask hook wiring ===
user_claude_md_path: /home/gonern/workspace/skillq/experiments/smoke/_user_claude_md_stub.md

# === LLM models (Layer 4 paths) ===
attribution_model: anthropic/${oc.env:ANTHROPIC_MODEL,deepseek-v4-flash}
editor_model: anthropic/${oc.env:EDITOR_MODEL,openai/gpt-4o}
embedder_model: openai/${oc.env:EMBEDDING_MODEL,text-embedding-v4}
embedder_dim: 1024

# === Auto-extract path (Layer 4a — create) ===
enable_auto_extract: true
extract_every_n_trials: 1
extract_max_new_per_trial: 1
extract_timeout_sec: 600

# === Benchmark input root ===
benchmark_input_path: ${oc.env:SkillQ_INPUT_ROOT,/home/gonern/workspace/skillq/input}
